<div class="flex-1 min-w-0">
  <!-- Title -->
  <h2 class="text-lg font-semibold text-gray-900 hover:text-primary-600 mb-2">
    <a [routerLink]="['/questions', question().questionId]">
      {{ question().title }}
    </a>
  </h2>

  <!-- Content Preview -->
  <div class="text-gray-600 mb-3 line-clamp-2">
    {{ question().content.substring(0, 200) }}...
  </div>

  <!-- Tags -->
  <div class="flex flex-wrap gap-2 mb-3">
    @for (tag of question().tags; track tag.tagId) {
      <span
        class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800 cursor-pointer hover:bg-blue-200"
        (click)="onTagClick(tag.tagId)">
        {{ tag.tagName }}
      </span>
    }
  </div>

  <!-- Meta Information -->
  <div class="flex items-center justify-between text-sm text-gray-500">
    <div class="flex items-center gap-2">
      @if (question().categoryName) {
        <span class="text-primary-600">{{ question().categoryName }}</span>
      }
    </div>
    <div class="flex items-center gap-2">
      <span>asked by <span class="font-medium text-gray-700">{{ question().username }}</span></span>
      <span>•</span>
      <span>{{ formatDate(question().createdAt) }}</span>
    </div>
  </div>
</div>
