<div class="bg-white rounded-lg shadow p-8 mb-6">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">
        {{ answerCount() }} {{ answerCount() === 1 ? 'Answer' : 'Answers' }}
    </h2>

    @if (answers().length === 0) {
    <p class="text-gray-600 text-center py-8">No answers yet. Be the first to answer!</p>
    } @else {
    <div class="space-y-6">
        @for (answer of answers(); track answer.answerId) {
        <app-answer-item [answer]="answer" [showVoteButtons]="canVote(answer)" (upvote)="onUpvote($event)"
            (downvote)="onDownvote($event)">
        </app-answer-item>
        }
    </div>
    }
</div>
