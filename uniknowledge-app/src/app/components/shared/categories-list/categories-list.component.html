<div class="bg-white rounded-lg shadow p-6">
    <h3 class="text-lg font-semibold text-gray-900 mb-4">Categories</h3>
    <div class="space-y-2">
        @for (category of categories(); track category.categoryId) {
        <button (click)="onCategoryClick(category.categoryId.toString())"
            class="w-full text-left px-3 py-2 rounded-md hover:bg-gray-100 flex items-center justify-between">
            <span class="text-gray-700">{{ category.categoryName }}</span>
            <span class="text-sm text-gray-500">{{ category.questionCount }}</span>
        </button>
        }
    </div>
</div>
