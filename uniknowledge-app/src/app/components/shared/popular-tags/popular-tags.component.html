<div class="bg-white rounded-lg shadow p-6 mb-6">
    <h3 class="text-lg font-semibold text-gray-900 mb-4">Popular Tags</h3>
    <div class="flex flex-wrap gap-2">
        @for (tag of popularTags(); track tag.tagId) {
        <button (click)="onTagClick(tag.tagId)"
            class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800 hover:bg-blue-200">
            {{ tag.tagName }}
            <span class="ml-1 text-blue-600">({{ tag.questionCount }})</span>
        </button>
        }
    </div>
</div>
