<div class="bg-gray-50 min-h-screen">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Main Content -->
      <div class="lg:col-span-9">
        <!-- Search Bar -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
          <div class="flex gap-4">
            <input type="text" [(ngModel)]="searchTerm" (keyup.enter)="onSearch()" placeholder="Search questions..."
              class="flex-1 px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500" />
            <button (click)="onSearch()"
              class="px-6 py-2 bg-primary-600 text-white rounded-md hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500">
              Search
            </button>
            @if (searchTerm || selectedCategoryId || selectedTagIds().length > 0) {
            <button (click)="clearFilters()"
              class="px-6 py-2 border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500">
              Clear
            </button>
            }
          </div>
        </div>

        <!-- Loading State -->
        @if (isLoading()) {
        <div class="bg-white rounded-lg shadow p-8 text-center">
          <p class="mt-2 text-gray-600">Loading questions...</p>
        </div>
        }

        <!-- Questions List -->
        @if (!isLoading()) {
        @if (questions().length === 0) {
        <div class="bg-white rounded-lg shadow p-8 text-center">
          <p class="text-gray-600">No questions found. Be the first to ask!</p>
        </div>
        } @else {
        <app-question-list [questions]="questions()" (tagClick)="onTagClick($event)">
        </app-question-list>

        <!-- Pagination Controls -->
        @if (questions().length > 0) {
        <div class="mt-8 flex items-center justify-center gap-2">
          <button (click)="previousPage()" [disabled]="currentPage() === 1"
            class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
            Previous
          </button>
          <span class="px-4 py-2 text-sm text-gray-700">
            Page {{ currentPage() }}
          </span>
          <button (click)="nextPage()" [disabled]="!hasNextPage"
            class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
            Next
          </button>
        </div>
        }
        }
        }
      </div>

      <!-- Sidebar -->
      <div class="mt-8 lg:mt-0 lg:col-span-3">
        <app-home-sidebar [popularTags]="popularTags()" [categories]="categories()" (tagClick)="onTagClick($event)"
          (categoryClick)="onCategoryChange($event)">
        </app-home-sidebar>
      </div>
    </div>
  </div>
</div>
