<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
  <div class="max-w-md w-full space-y-8">
    <div>
      <h2 class="text-3xl font-bold text-center text-gray-900">Forgot Password</h2>
      <p class="mt-2 text-center text-gray-600">
        Enter your email to receive OTP code
      </p>
    </div>
    
    @if (message()) {
      <div class="p-4 rounded-md" [class.bg-green-50]="isSuccess()" [class.bg-red-50]="!isSuccess()">
        <p class="text-sm" [class.text-green-800]="isSuccess()" [class.text-red-800]="!isSuccess()">
          {{ message() }}
        </p>
      </div>
    }
    
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input 
          id="email"
          type="email" 
          formControlName="email" 
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-primary-500 focus:border-primary-500"
          placeholder="your.email@example.com"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <p class="mt-1 text-sm text-red-600">Please enter a valid email</p>
        }
      </div>
      
      <button 
        type="submit" 
        [disabled]="isLoading()"
        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 disabled:opacity-50"
      >
        {{ isLoading() ? 'Sending...' : 'Send OTP Code' }}
      </button>
      
      <div class="text-center">
        <a routerLink="/login" class="text-sm text-primary-600 hover:text-primary-500">
          Back to Login
        </a>
      </div>
    </form>
  </div>
</div>
